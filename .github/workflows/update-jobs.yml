name: 채용 공고 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 KST 09:00
  workflow_dispatch:        # 수동 실행

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 원티드 공고 업데이트
        run: python3 scripts/update_jobs.py

      - name: 커밋 & 푸시
        run: |
          git config user.email "yuncontest@naver.com"
          git config user.name "좋은취업 봇"
          git add jobs.html
          git diff --staged --quiet || git commit -m "chore: 채용공고 자동업데이트 $(date '+%Y.%m.%d')"
          git push
